# Mehreagan ERP — hardened Docker Compose
#
# Architecture:
#   Internet → Caddy (:80 only for now) → frontend + backend (Docker network)
#   postgres + rabbitmq: internal network only (no host publish)
#   backend/frontend also bound to 127.0.0.1 for local admin only
#
# From Backend2 root:
#   copy deploy\docker\secure\.env.example values into .env
#   copy deploy\docker\secure\.dockerignore.backend → merge into .dockerignore
#   copy deploy\docker\secure\.dockerignore.frontend → Frontend-Next3\.dockerignore
#   docker compose -f deploy/docker/secure/docker-compose.yml --env-file .env up -d --build
#
# Windows Server + Docker Desktop:
#   Linux security_opt / cap_drop apply inside the Linux VM.
#   Never mount docker.sock. Never use privileged: true.

name: mehragan-erp-secure

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: true

services:
  caddy:
    image: ${CADDY_IMAGE:-caddy:2.8-alpine}
    restart: unless-stopped
    privileged: false
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    ports:
      - "80:80"
      # Uncomment after TLS certs configured:
      # - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    tmpfs:
      - /tmp:size=32m,mode=1777
    networks:
      - edge
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80/healthz"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 256M
        reservations:
          cpus: "0.10"
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    privileged: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-task_management}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}",
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  rabbitmq:
    image: ${RABBITMQ_IMAGE:-rabbitmq:3.13-alpine}
    restart: unless-stopped
    privileged: false
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-erp_mq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build:
      context: ../../..
      dockerfile: deploy/docker/secure/Dockerfile.backend
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim-bookworm}
    image: mehragan-erp-backend:secure
    restart: unless-stopped
    privileged: false
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "10001:10001"
    env_file: ../../../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-task_management}
      RABBITMQ_HOST: rabbitmq
      UPLOAD_DIR: /app/data/uploads
      ROOT_PATH: ${ROOT_PATH:-}
      IP_WHITELIST_ENABLED: ${IP_WHITELIST_ENABLED:-false}
    volumes:
      - uploads_data:/app/data/uploads
      - ../../../scripts:/app/scripts:ro
    tmpfs:
      - /tmp:size=64m,mode=1777
    networks:
      - internal
      - edge
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "2.00"
          memory: 2G
        reservations:
          cpus: "0.25"
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  consumer:
    image: mehragan-erp-backend:secure
    restart: unless-stopped
    privileged: false
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "10001:10001"
    command: ["python", "-m", "app.infrastructure.messaging.consumer"]
    env_file: ../../../.env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-task_management}
      RABBITMQ_HOST: rabbitmq
      UPLOAD_DIR: /app/data/uploads
    volumes:
      - uploads_data:/app/data/uploads
    tmpfs:
      - /tmp:size=64m,mode=1777
    networks:
      - internal
    depends_on:
      backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
        reservations:
          cpus: "0.10"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      # Sibling of Backend2 on server: E:\ERP\Frontend-Next3
      context: ${FRONTEND_CONTEXT:-../../../../Frontend-Next3}
      # Path relative to build context
      dockerfile: ${FRONTEND_DOCKERFILE:-../Backend2/deploy/docker/secure/Dockerfile.frontend}
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL}
        API_URL: http://backend:8000
    image: mehragan-erp-frontend:secure
    restart: unless-stopped
    privileged: false
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    user: "10001:10001"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      API_URL: http://backend:8000
      JWT_SERVER_SECRET: ${JWT_SERVER_SECRET:?Set JWT_SERVER_SECRET}
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    tmpfs:
      - /tmp:size=64m,mode=1777
    networks:
      - edge
      - internal
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 20s
      timeout: 5s
      retries: 8
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: "1.00"
          memory: 1G
        reservations:
          cpus: "0.20"
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:
