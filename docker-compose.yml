# Mehreagan ERP — Docker Compose (Windows Server + Docker Desktop)
#
# Usage (from Backend2 folder):
#   1. copy deploy\docker\.env.example .env   → edit values
#   2. docker compose build
#   3. docker compose up -d
#   4. run seed scripts once (see deploy\docker\seed.ps1)
#   5. ERP UI/API on host ports (default 8080/8081) — no IIS required
#      Override: BACKEND_PUBLISH_PORT / FRONTEND_PUBLISH_PORT in .env

name: mehragan-erp

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-erp_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-task_management}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-erp_user} -d ${POSTGRES_DB:-task_management}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  rabbitmq:
    image: ${RABBITMQ_IMAGE:-rabbitmq:3.13-management-alpine}
    restart: unless-stopped
    # guest فقط از localhost مجاز است؛ از کانتینرهای دیگر ACCESS_REFUSED می‌خورد
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-erp_rabbit}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-/}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 18
      start_period: 40s

  backend:
    container_name: mehregan-backend
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim-bookworm}
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-task_management}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-erp_rabbit}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      UPLOAD_DIR: /app/data/uploads
      # Swagger off unless ENABLE_API_DOCS=true; compose defaults ENVIRONMENT to production
      ENVIRONMENT: ${ENVIRONMENT:-production}
      ENABLE_API_DOCS: ${ENABLE_API_DOCS:-false}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - default
      - shared-proxy-network

    volumes:
      - uploads_data:/app/data/uploads
      - ./scripts:/app/scripts:ro

  consumer:
    build:
      context: .
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim-bookworm}
    restart: unless-stopped
    command: ["python", "-m", "app.infrastructure.messaging.consumer"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-erp_user}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-task_management}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-erp_rabbit}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:?Set RABBITMQ_PASSWORD in .env}
      RABBITMQ_VHOST: ${RABBITMQ_VHOST:-/}
      UPLOAD_DIR: /app/data/uploads
    depends_on:
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_started
    volumes:
      - uploads_data:/app/data/uploads
      - ./scripts:/app/scripts:ro

  frontend:
    container_name: mehregan-frontend
    build:
      context: ${FRONTEND_CONTEXT:-../Frontend-Next3}
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL in .env}
        API_URL: http://backend:8000
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      API_URL: http://backend:8000
      JWT_SERVER_SECRET: ${JWT_SERVER_SECRET:?Set JWT_SERVER_SECRET in .env}
    depends_on:
      backend:
        condition: service_started
    networks:
      - default
      - shared-proxy-network


volumes:
  postgres_data:
  uploads_data:
networks:
  default:
    driver: bridge
  shared-proxy-network:
    external: true
